<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoList - Premium Workspace</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(124, 77, 255, 0.2);
            border-radius: 10px;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7C4DFF',
                        'primary-dark': '#6200EA',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const commonFoods = [
            { name: "Apple", kcal: 52, p: 0.3, c: 14, f: 0.2 },
            { name: "Banana", kcal: 89, p: 1.1, c: 23, f: 0.3 },
            { name: "Chicken Breast", kcal: 165, p: 31, c: 0, f: 3.6 },
            { name: "Rice (Cooked)", kcal: 130, p: 2.7, c: 28, f: 0.3 },
            { name: "Egg (Large)", kcal: 155, p: 13, c: 1.1, f: 11 },
            { name: "Milk", kcal: 61, p: 3.2, c: 4.8, f: 3.3 },
            { name: "Oats", kcal: 389, p: 16.9, c: 66, f: 6.9 },
            { name: "Paneer", kcal: 265, p: 18, c: 1.2, f: 20 },
            { name: "Roti", kcal: 264, p: 9, c: 47, f: 3.6 },
            { name: "Almonds", kcal: 579, p: 21, c: 22, f: 50 }
        ];

        // --- Shared Components ---

        function Sidebar({ activeTab, setActiveTab, isDarkMode, setIsDarkMode, onLogout, stats, isMobile }) {
            const tabs = [
                { id: 'tasks', label: 'Tasks', icon: 'clipboard-list' }
            ];
            return (
                <div className="flex flex-col h-full w-full">
                    <div className="flex items-center gap-3 mb-10 px-2">
                        <div className="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg"><i data-lucide="check-circle-2"></i></div>
                        <h1 className="text-2xl font-black text-slate-800 dark:text-white tracking-tight">ToDoList</h1>
                    </div>
                    <nav className="flex-1 space-y-1">
                        <p className="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-widest mb-4 px-2">Navigation</p>
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm transition-all ${activeTab === tab.id ? "bg-primary/10 text-primary" : "text-slate-400 hover:bg-slate-50 dark:hover:bg-zinc-900"}`}>
                                <i data-lucide={tab.icon} className={activeTab === tab.id ? 'opacity-100' : 'opacity-40'}></i> {tab.label}
                            </button>
                        ))}
                    </nav>
                    <div className="mt-6 space-y-4">
                        <div className="bg-slate-50 dark:bg-zinc-900/50 rounded-2xl p-4 border border-slate-100 dark:border-zinc-800">
                            <div className="flex justify-between mb-1"><span className="text-xl font-black text-slate-700 dark:text-white">{stats.completed}</span><span className="text-xs text-slate-400">/ {stats.total}</span></div>
                            <div className="w-full h-1.5 bg-slate-200 dark:bg-zinc-800 rounded-full overflow-hidden"><motion.div animate={{ width: `${(stats.completed / Math.max(1, stats.total)) * 100}%` }} className="h-full bg-primary" /></div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="flex-1 h-12 flex items-center justify-center bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-300 rounded-xl"><i data-lucide={isDarkMode ? 'sun' : 'moon'}></i></button>
                            <button onClick={onLogout} className="flex-1 h-12 flex items-center justify-center bg-red-50 dark:bg-red-500/10 text-red-500 rounded-xl"><i data-lucide="log-out"></i></button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Task Components ---

        function TaskItem({ task, onToggle, onDelete }) {
            return (
                <motion.div layout initial={{ opacity: 0 }} animate={{ opacity: task.completed ? 0.6 : 1 }} className="relative bg-white dark:bg-zinc-900 rounded-[2rem] p-5 flex items-center gap-4 shadow-sm border border-slate-100 dark:border-zinc-800 mb-4 overflow-hidden group">
                    <div className={`absolute left-0 top-0 bottom-0 w-2 ${task.priority === 'HIGH' ? 'bg-red-500' : task.priority === 'MEDIUM' ? 'bg-amber-400' : 'bg-green-500'}`}></div>
                    <button onClick={() => onToggle(task.id)} className={`w-7 h-7 rounded-full border-2 flex items-center justify-center transition-all ${task.completed ? 'bg-primary border-primary text-white' : 'border-slate-200 dark:border-zinc-700'}`}>
                        {task.completed && <i data-lucide="check" class="w-4 h-4"></i>}
                    </button>
                    <div className="flex-1 min-w-0">
                        <h4 className={`text-lg font-bold text-slate-800 dark:text-white truncate ${task.completed ? 'line-through text-slate-400' : ''}`}>{task.title}</h4>
                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{task.category}</span>
                    </div>
                    <button onClick={() => onDelete(task.id)} className="p-2 text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </motion.div>
            );
        }


        // --- Main App ---

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(localStorage.getItem('isLoggedIn') === 'true');
            const [tasks, setTasks] = useState(JSON.parse(localStorage.getItem('tasks') || '[]'));
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [activeTab, setActiveTab] = useState('tasks');
            const [showAdd, setShowAdd] = useState(false);
            const [mobileMenu, setMobileMenu] = useState(false);

            useEffect(() => {
                localStorage.setItem('tasks', JSON.stringify(tasks));
                localStorage.setItem('isLoggedIn', isLoggedIn);
                lucide.createIcons();
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [tasks, isLoggedIn, isDarkMode, activeTab, mobileMenu]);

            if (!isLoggedIn) return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-white p-8 text-center">
                    <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}>
                        <h1 className="text-7xl font-black text-primary mb-6 tracking-tighter">Hello!</h1>
                        <h2 className="text-3xl font-bold text-slate-800 mb-4 leading-tight">Welcome to ToDoList</h2>
                        <p className="text-slate-400 mb-12 text-lg">Your workspace for tasks and vitality.</p>
                        <button onClick={() => setIsLoggedIn(true)} className="w-full max-w-sm h-16 bg-primary text-white rounded-2xl font-black text-xl shadow-xl shadow-primary/20">Get Started</button>
                    </motion.div>
                </div>
            );

            const stats = { completed: tasks.filter(t => t.completed).length, total: tasks.length };

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-zinc-950 flex transition-colors duration-300">
                    <div className="hidden lg:flex w-80 h-screen fixed left-0 top-0 border-r border-slate-100 dark:border-zinc-900 bg-white dark:bg-zinc-950 p-8 z-30">
                        <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} onLogout={() => { setIsLoggedIn(false); localStorage.clear(); location.reload(); }} stats={stats} />
                    </div>

                    <main className="flex-1 lg:ml-80 min-h-screen pb-32">
                        <div className="max-w-5xl mx-auto px-6 py-12 lg:px-12">
                            <header className="flex items-center justify-between mb-12">
                                <button onClick={() => setMobileMenu(true)} className="lg:hidden p-3 bg-white dark:bg-zinc-900 rounded-2xl shadow-sm border border-slate-100 dark:border-zinc-800 dark:text-white"><i data-lucide="menu"></i></button>
                                <div className="text-center lg:text-left flex-1 lg:flex-none">
                                    <h1 className="text-3xl font-black text-slate-800 dark:text-white tracking-tight">My Tasks</h1>
                                </div>
                                <div className="lg:hidden w-10"></div>
                            </header>

                            <AnimatePresence mode='wait'>
                                <motion.div key="tasks" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-10">
                                        <div className="xl:col-span-4 space-y-6">
                                            <div className="w-full bg-gradient-to-br from-indigo-600 to-sky-400 p-8 rounded-[2.5rem] text-white shadow-xl">
                                                <h3 className="text-3xl font-black mb-1">{stats.completed} / {stats.total}</h3>
                                                <p className="text-white/70 text-xs font-bold uppercase tracking-widest">Tasks Accomplished</p>
                                            </div>
                                        </div>
                                        <div className="xl:col-span-8 space-y-2">
                                            {tasks.map(t => <TaskItem key={t.id} task={t} onToggle={id => setTasks(tasks.map(x => x.id === id ? { ...x, completed: !x.completed } : x))} onDelete={id => setTasks(tasks.filter(x => x.id !== id))} />)}
                                            {tasks.length === 0 && <div className="py-20 text-center text-slate-400 opacity-20"><i data-lucide="list" class="w-20 h-20 mx-auto"></i></div>}
                                        </div>
                                    </div>
                                </motion.div>
                            </AnimatePresence>
                        </div>
                    </main>

                    <button onClick={() => setShowAdd(true)} className="fixed bottom-10 right-10 w-20 h-20 bg-primary text-white rounded-[1.75rem] flex items-center justify-center shadow-2xl shadow-primary/30 z-40"><i data-lucide="plus" class="w-10 h-10"></i></button>

                    <AnimatePresence>{showAdd && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/60 backdrop-blur-sm">
                            <motion.div initial={{ y: "100%" }} animate={{ y: 0 }} className="w-full max-w-md bg-white dark:bg-zinc-900 rounded-t-[3rem] sm:rounded-[3rem] p-10 shadow-2xl">
                                <h2 className="text-3xl font-black mb-8 dark:text-white">New Task</h2>
                                <input autoFocus placeholder="Task name..." onKeyDown={e => { if (e.key === 'Enter' && e.target.value) { setTasks([...tasks, { id: Date.now(), title: e.target.value, completed: false, priority: 'MEDIUM', category: 'WORK' }]); setShowAdd(false); } }} className="w-full h-16 px-6 bg-slate-50 dark:bg-zinc-800 rounded-2xl outline-none mb-6 dark:text-white" />
                                <button onClick={() => setShowAdd(false)} className="w-full h-16 font-bold text-slate-400">Cancel</button>
                            </motion.div>
                        </div>
                    )}</AnimatePresence>

                    <AnimatePresence>{mobileMenu && <><motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setMobileMenu(false)} className="fixed inset-0 bg-black/60 backdrop-blur-md z-40 lg:hidden" /><motion.div initial={{ x: "-100%" }} animate={{ x: 0 }} exit={{ x: "-100%" }} className="fixed left-0 top-0 bottom-0 w-80 bg-white dark:bg-zinc-950 z-50 lg:hidden p-8 flex flex-col"><Sidebar activeTab={activeTab} setActiveTab={t => { setActiveTab(t); setMobileMenu(false); }} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} onLogout={() => location.reload()} stats={stats} isMobile={true} /></motion.div></>}</AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
